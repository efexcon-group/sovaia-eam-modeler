# Tenant-Template — pro Lizenz-Tenant aus diesem File ableiten und Platzhalter
# {{TENANT_SLUG}}, {{TENANT_REALM}} ersetzen.

namespace: eam-modeler-{{TENANT_SLUG}}
tenant: "{{TENANT_SLUG}}"

api:
  env:
    EAM_ENV: "tenant"
    EAM_TENANT_DEFAULT: "{{TENANT_SLUG}}"

ingress:
  host: "{{TENANT_SLUG}}.architektur.sovaia.ch"

oidc:
  issuer: "https://identity-kc.int.efexcon.com/auth/realms/{{TENANT_REALM}}"
  clientId: architecture-modeler-frontend
  audience: architecture-modeler-api

# License-Core-Check ist im Tenant-Mode Pflicht (im internal-Mode deaktiviert).
licenseCheck:
  required: true
