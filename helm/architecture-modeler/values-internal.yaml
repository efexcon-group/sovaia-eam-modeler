# Sovaia-Internal-Deployment (efexcon, im platform-Namespace).
# Auth über internen Keycloak. License-Check deaktiviert (interner Tier).

namespace: platform
tenant: sovaia-internal

api:
  env:
    EAM_ENV: internal
    EAM_TENANT_DEFAULT: sovaia-internal

bridge:
  env:
    EAM_LLM_MODE: dgx              # produktive DGX-Anbindung
    DGX_TIMEOUT_SECONDS: "150"

oidc:
  enabled: true
  issuer: https://keycloak.int.efexcon.com/realms/efexcon-group
  audience: architecture-modeler-api
  authRequired: false              # bis Backend-OIDC-Code da ist

license:
  enabled: false

ingress:
  host: architektur-modeler.int.efexcon.com
