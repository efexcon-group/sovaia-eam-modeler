apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "am.fullname" . }}-llm-bridge
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "am.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-bridge
spec:
  replicas: {{ .Values.eamLlmBridge.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "am.name" . }}
      app.kubernetes.io/component: llm-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "am.name" . }}
        app.kubernetes.io/component: llm-bridge
    spec:
      containers:
        - name: llm-bridge
          image: "{{ .Values.eamLlmBridge.image.repository }}:{{ .Values.eamLlmBridge.image.tag }}"
          imagePullPolicy: {{ .Values.eamLlmBridge.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.eamLlmBridge.port }}
          env:
            {{- range $k, $v := .Values.eamLlmBridge.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /v1/health, port: {{ .Values.eamLlmBridge.port }} }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.eamLlmBridge.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "am.fullname" . }}-llm-bridge
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "am.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-bridge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "am.name" . }}
    app.kubernetes.io/component: llm-bridge
  ports:
    - name: http
      port: {{ .Values.eamLlmBridge.port }}
      targetPort: {{ .Values.eamLlmBridge.port }}
