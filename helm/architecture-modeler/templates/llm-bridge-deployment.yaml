apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "am.fullname" . }}-llm-bridge
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "am.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-bridge
spec:
  replicas: {{ .Values.bridge.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "am.name" . }}
      app.kubernetes.io/component: llm-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "am.name" . }}
        app.kubernetes.io/component: llm-bridge
    spec:
      containers:
        - name: llm-bridge
          image: "{{ .Values.images.bridge.repository }}:{{ .Values.images.bridge.tag }}"
          imagePullPolicy: {{ .Values.images.bridge.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.bridge.port }}
          env:
            {{- range $k, $v := .Values.bridge.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            # DGX-Sensitivdaten aus Secret (auch wenn LLM_MODE=stub — bleibt
            # leer wenn Secret nicht gesetzt, das ist OK).
            - name: DGX_LLM_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bridge.dgxSecretRef.name }}
                  key: DGX_LLM_URL
                  optional: true
            - name: DGX_MODEL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bridge.dgxSecretRef.name }}
                  key: DGX_MODEL
                  optional: true
            - name: DGX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bridge.dgxSecretRef.name }}
                  key: DGX_API_KEY
                  optional: true
          livenessProbe:
            httpGet: { path: /v1/health, port: {{ .Values.bridge.port }} }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /v1/health, port: {{ .Values.bridge.port }} }
            periodSeconds: 10
          resources:
            {{- toYaml .Values.bridge.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "am.fullname" . }}-llm-bridge
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "am.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-bridge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "am.name" . }}
    app.kubernetes.io/component: llm-bridge
  ports:
    - name: http
      port: {{ .Values.bridge.port }}
      targetPort: {{ .Values.bridge.port }}
