{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "am.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "am.labels" . | nindent 4 }}
  annotations:
    {{- range $k, $v := .Values.ingress.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ include "am.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "am.fullname" . }}-api
                port: { number: {{ .Values.api.port }} }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "am.fullname" . }}-frontend
                port: { number: 80 }
{{- end }}
