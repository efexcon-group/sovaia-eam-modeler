apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "am.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "am.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "am.name" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "am.name" . }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
          livenessProbe:
            httpGet: { path: /, port: {{ .Values.frontend.port }} }
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "am.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "am.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "am.name" . }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.frontend.port }}
