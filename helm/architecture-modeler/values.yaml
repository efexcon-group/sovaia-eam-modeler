# Defaults für architecture-modeler. Wird durch values-internal.yaml bzw
# values-tenant-template.yaml überschrieben.

namespace: platform
tenant: sovaia-internal

# ── Container-Images (CI pusht nach jedem main-merge) ───────────────────
images:
  api:
    repository: ghcr.io/efexcon-group/architecture-modeler-api
    tag: latest
    pullPolicy: Always
  frontend:
    repository: ghcr.io/efexcon-group/architecture-modeler-frontend
    tag: latest
    pullPolicy: Always
  bridge:
    repository: ghcr.io/efexcon-group/eam-llm-bridge
    tag: latest
    pullPolicy: Always

# ── API ─────────────────────────────────────────────────────────────────
# Sovaia-Reference ist im API-Image gebaked unter /etc/sovaia-reference.
# Source-of-Truth: backend/reference/ in diesem Repo (kein CI-Copy aus
# sovaia-contracts). Keine Init-Container, keine K8s-Secrets, kein Runtime-
# Cloning — alles via Image-Updater + Image-Tag-Bumps versioniert.
api:
  replicas: 1
  port: 8000
  env:
    EAM_ENV: cluster
    EAM_REFERENCE_REPO_PATH: /etc/sovaia-reference
    EAM_LLM_BRIDGE_URL: http://architecture-modeler-llm-bridge:8001
    EAM_LLM_BRIDGE_TIMEOUT: "180"
    EAM_OVERLAY_DIR: /data/overlays
    EAM_TENANT_DEFAULT: sovaia-internal
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ── Frontend (nginx + statisches React-Bundle) ──────────────────────────
frontend:
  replicas: 1
  port: 80
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }

# ── Bridge (LLM → DGX) ──────────────────────────────────────────────────
bridge:
  replicas: 1
  port: 8001
  env:
    EAM_LLM_MODE: stub             # stub | dgx — Override per values-internal
    DGX_TIMEOUT_SECONDS: "150"
  # DGX-Sensitivdaten (URL, MODEL, API_KEY) kommen aus secretRef:
  dgxSecretRef:
    name: architecture-modeler-dgx-config
    # erwartete Keys: DGX_LLM_URL, DGX_MODEL, DGX_API_KEY
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ── Overlay-Persistenz (Tenant-Edits) ───────────────────────────────────
overlays:
  pvc:
    enabled: true
    storageClass: local-path        # K3S-Default
    size: 1Gi
    accessMode: ReadWriteOnce

# ── OIDC (Keycloak intern) ──────────────────────────────────────────────
# Env wird gesetzt, Backend-Validierung kommt mit nächster Backend-Iteration.
oidc:
  enabled: true
  issuer: https://keycloak.int.efexcon.com/realms/efexcon-group
  audience: architecture-modeler-api
  authRequired: false              # bis Backend OIDC-Middleware integriert ist

# ── License-Core (für Tenant-Stufen) ────────────────────────────────────
license:
  enabled: false                   # values-internal: false. values-tenant-template: true.
  url: ""
  secretRef:
    name: ""
    key: ""

# ── Ingress ─────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: architektur-modeler.int.efexcon.com
  tls:
    enabled: true
    secretName: architecture-modeler-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"

# ── Labels & Annotations ────────────────────────────────────────────────
podAnnotations: {}

serviceAccount:
  create: false                    # nutzt default-SA im Namespace
  name: ""
