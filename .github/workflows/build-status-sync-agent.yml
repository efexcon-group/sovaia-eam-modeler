name: build-status-sync-agent

on:
  push:
    branches: [main]
    paths:
      - 'status-sync-agent/**'
      - 'backend/reference/**'
      - '.github/workflows/build-status-sync-agent.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/efexcon-group/status-sync-agent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sovaia-Reference (mit source-bindings) ins Agent-Build-Context vendoren —
      # gleiche Quelle wie das architecture-modeler-api-Image.
      - name: Vendor Sovaia-Reference into build context
        run: cp -r backend/reference status-sync-agent/reference

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v5
        with:
          context: ./status-sync-agent
          file: ./status-sync-agent/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ssa
          cache-to: type=gha,mode=max,scope=ssa
