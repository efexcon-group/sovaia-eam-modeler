name: build-frontend-next

# Baut das neue Next.js-Frontend (ADR-104). Parallel zum Vite-frontend bis zum
# Cutover (Phase E). Auf Push zu frontend-next/** + manuell.
on:
  push:
    branches: [main]
    paths:
      - "frontend-next/**"
      - ".github/workflows/build-frontend-next.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/efexcon-group/architecture-modeler-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: true
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend-next
          cache-to: type=gha,mode=max,scope=frontend-next
