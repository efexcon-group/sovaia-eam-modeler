name: build-backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend.yml'
  # Reference-Updates triggern auch einen Build via workflow_dispatch
  # bzw via Cross-Repo-Workflow in sovaia-contracts.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/efexcon-group/architecture-modeler-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sovaia-eam-modeler
        uses: actions/checkout@v4

      - name: Checkout sovaia-contracts (reference)
        uses: actions/checkout@v4
        with:
          repository: efexcon-group/sovaia-contracts
          token: ${{ secrets.CONTRACTS_READ_TOKEN }}
          path: _contracts
          ref: main

      - name: Bake reference into backend build context
        run: |
          mkdir -p backend/reference
          cp -r _contracts/registry/architecture-modeler/. backend/reference/
          echo "Reference content baked:"
          ls -la backend/reference/

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
