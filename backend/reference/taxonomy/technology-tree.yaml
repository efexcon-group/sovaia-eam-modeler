# Technology-Layer-Baum.
# Plattformen, Frameworks, Sprachen, Runtimes, AI-Modelle.
# V1-Stub.

taxonomy-id: technology
taxonomy-version: "0.1.0"
layer: technology

roots:

  - id: ai-models
    label-de: AI-Modelle
    summary-de: LLMs, Embedding-Modelle, Inferenz-Stack.
    children:
      - { id: llm-host,     label-de: LLM-Hosting (DGX, vLLM), summary-de: On-prem Inferenz mit Qwen/Llama/Mistral. }
      - { id: embed-models, label-de: Embedding-Modelle,       summary-de: Qwen-Embed-4B u.a. für RAG-Pipelines. }
      - { id: agent-frame,  label-de: Agent-Framework,         summary-de: Tool-Use, MCP, Workflow-Engines. }

  - id: runtimes
    label-de: Runtimes
    summary-de: Container-/Function-/Sprach-Runtimes.
    children:
      - { id: kubernetes,   label-de: Kubernetes (K3S, EKS),   summary-de: Container-Orchestrierung mit ArgoCD. }
      - { id: nodejs,       label-de: Node.js,                 summary-de: TypeScript-Runtime für Web/API. }
      - { id: python,       label-de: Python,                  summary-de: FastAPI, Data-Pipelines, ML-Inferenz. }
      - { id: jvm,          label-de: JVM,                     summary-de: Legacy-Integration, Spark, Kafka-Streams. }

  - id: frameworks
    label-de: Frameworks
    summary-de: Web, Backend, AI-Framework, UI-Komponenten.
    children:
      - { id: react,        label-de: React + Vite,            summary-de: Frontends mit React-Flow, Tailwind. }
      - { id: nextjs,       label-de: Next.js,                 summary-de: SSR-Frontends, license-core, Admin-Panels. }
      - { id: fastapi,      label-de: FastAPI,                 summary-de: Python-Backend-Services + OpenAPI. }
      - { id: tailwind,     label-de: Tailwind CSS,            summary-de: UI-Token-System + Design-Sprache. }

  - id: data-tech
    label-de: Daten-Technologie
    summary-de: Datenbanken, Such-Engines, Streams, ETL.
    children:
      - { id: postgres,     label-de: PostgreSQL + pgvector,   summary-de: Relationale DB + Vektor-Embeddings. }
      - { id: minio,        label-de: MinIO / S3,              summary-de: Objektspeicher für Dokumente, Embeddings, Backups. }
      - { id: redis,        label-de: Redis,                   summary-de: Cache, Pub/Sub, Rate-Limit-Backend. }
      - { id: kafka,        label-de: Streaming / Kafka,       summary-de: Event-Streams für CDC, Realtime-Pipelines. }

  - id: identity-tech
    label-de: Identity-Tech
    summary-de: Auth-/Identity-Provider und SSO.
    children:
      - { id: keycloak,     label-de: Keycloak (Internal + Identity-KC), summary-de: Dual-Realm-Setup für Mitarbeiter + Customer. }
      - { id: entra,        label-de: Microsoft Entra,         summary-de: Federation-Quelle für interne Mitarbeiter. }
      - { id: oidc,         label-de: OIDC-Standards,          summary-de: Standard-Auth-Flows, Tokens, JWKS. }

  - id: devops-tech
    label-de: DevOps-Tech
    summary-de: CI/CD, IaC, Observability.
    children:
      - { id: argocd,       label-de: ArgoCD,                  summary-de: GitOps-Sync für alle Apps in der Plattform. }
      - { id: github-act,   label-de: GitHub Actions,          summary-de: CI für Image-Builds, Tests, Releases. }
      - { id: prometheus,   label-de: Prometheus + Grafana,    summary-de: Metriken, Dashboards, Alerting. }
      - { id: cloudflared,  label-de: Cloudflared,             summary-de: Zero-Trust-Tunnel für extern-erreichbare Ingresses. }

  # ── Hyperscaler / SaaS-Plattformen (T2-Katalog) — Drill: Provider → Kategorie ──
  # Die konkreten Technologien hängen als Classic-Knoten (ownership: classic) an
  # den Kategorie-Pfaden (technology/<provider>/<kategorie>) und erscheinen beim
  # Drill auf die Kategorie im Classic-vs-Sovaia-Vergleich + in der Bibliothek.

  - id: azure
    label-de: Microsoft Azure
    summary-de: Microsofts Public-Cloud-Plattform — Compute, Storage, Datenbanken, AI, Identity.
    children:
      - { id: compute,    label-de: Compute,            summary-de: VMs, Container, Serverless. }
      - { id: storage,    label-de: Storage,            summary-de: Objekt-, Datei- und Block-Speicher. }
      - { id: databases,  label-de: Datenbanken,        summary-de: Relational, NoSQL, Cache. }
      - { id: networking, label-de: Netzwerk,           summary-de: Virtuelle Netze, Load-Balancing, Edge. }
      - { id: ai-ml,      label-de: AI + Machine Learning, summary-de: Azure OpenAI, AI Search, ML. }
      - { id: identity,   label-de: Identity & Security, summary-de: Entra ID, Key Vault, Defender, Sentinel. }

  - id: aws
    label-de: Amazon Web Services
    summary-de: Amazons Public-Cloud-Plattform — breitestes Service-Portfolio am Markt.
    children:
      - { id: compute,    label-de: Compute,            summary-de: EC2, EKS, Lambda, Fargate. }
      - { id: storage,    label-de: Storage,            summary-de: S3, EBS, EFS, Glacier. }
      - { id: databases,  label-de: Datenbanken,        summary-de: RDS, Aurora, DynamoDB, ElastiCache. }
      - { id: networking, label-de: Netzwerk,           summary-de: VPC, ELB, CloudFront, Route 53. }
      - { id: ai-ml,      label-de: AI + Machine Learning, summary-de: Bedrock, SageMaker, Comprehend, Textract. }
      - { id: identity,   label-de: Identity & Security, summary-de: IAM, Cognito, KMS, GuardDuty. }

  - id: m365
    label-de: Microsoft 365
    summary-de: Microsofts Produktivitäts- und Collaboration-Suite (SaaS).
    children:
      - { id: productivity,     label-de: Produktivität,        summary-de: Word, Excel, PowerPoint, OneNote. }
      - { id: collaboration,    label-de: Zusammenarbeit,       summary-de: Teams, Loop, Viva Engage, Whiteboard. }
      - { id: mail-calendar,    label-de: Mail & Kalender,      summary-de: Exchange Online, Outlook. }
      - { id: files-content,    label-de: Dateien & Content,    summary-de: SharePoint, OneDrive, Stream. }
      - { id: identity-devices, label-de: Identität & Geräte,   summary-de: Entra ID, Intune, Purview. }
      - { id: power-platform,   label-de: Power Platform,       summary-de: Power Apps, Automate, BI, Copilot Studio. }
