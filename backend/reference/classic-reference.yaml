  # das Preset "heim-pflege-ch" als Vorschlag in die Kunden-Instanz übernommen.

  - id: cls-polypoint-pep
    type: anwendung
    label-de: PolyPoint PEP
    tags:
      ownership: classic
      taxonomy-paths: "business/healthcare/heim-pflege/mitarbeiter"
      operational-status: in-use-everywhere
      seeded-by: human-architect
    vendor: PolyPoint AG
    product: PEP
    category: Personaleinsatzplanung
    summary-de: Etablierte Schweizer Lösung für Personaleinsatz- und Dienstplanung in Heimen und Spitälern — Schichtplanung, Sollzeiten, Qualifikations- und Bedarfsabgleich.

  - id: cls-raisoft
