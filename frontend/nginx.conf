server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Backend-Proxy — Service-Name aus docker-compose.
  location /v1/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    # X-EAM-Tenant kann der Client setzen, Header weitergeben.
    proxy_set_header X-EAM-Tenant $http_x_eam_tenant;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # SPA-Fallback — alle anderen Routes → index.html (HashRouter).
  location / {
    try_files $uri /index.html;
  }
}
