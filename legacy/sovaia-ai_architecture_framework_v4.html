<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><title>AI Architecture Framework v4 — TOGAF Layered</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#fff;padding:1rem}
.wrap{padding:.75rem 0;font-size:13px}
.top-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.9rem;align-items:center}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid #ccc;cursor:pointer;background:#f5f5f5;color:#555;transition:background .15s}
.pill.active{background:#fff;color:#111;border-color:#888;font-weight:500}
.pill.noai-pill.active{background:#FAECE7;color:#712B13;border-color:#D85A30}
.split{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}
.layer{border-radius:8px;border:0.5px solid #ddd;margin-bottom:7px;overflow:hidden;transition:opacity .2s}
.layer.dim{opacity:.18}
.layer.noai-hl{border-color:#D85A30}
.layer-head{display:flex;align-items:center;gap:7px;padding:8px 11px;cursor:pointer;user-select:none}
.lnum{font-size:10px;font-weight:500;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ltitle{font-size:12px;font-weight:500;flex:1;color:#111}
.chevron{font-size:10px;color:#999;transition:transform .2s;flex-shrink:0}
.layer.open .chevron{transform:rotate(180deg)}
.layer-body{padding:0 11px 9px;display:none}
.layer.open .layer-body{display:block}
.togaf-domain{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:500;white-space:nowrap}
.adm-badge{font-size:9px;padding:1px 5px;border-radius:6px;border:0.5px solid #ccc;color:#888;white-space:nowrap}
.obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}
.obj{background:#f5f5f5;border-radius:6px;padding:6px 8px;cursor:pointer;border:1px solid transparent;transition:border-color .15s,background .15s}
.obj:hover{border-color:#ccc}
.obj.selected{border-color:#534AB7;background:#EEEDFE}
.obj.noai-obj{background:#FAECE7}
.obj.noai-obj.selected{border-color:#993C1D;background:#F5C4B3}
.obj-label{font-size:9px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.obj-val{font-size:11px;color:#111;line-height:1.4}
.divider{height:0.5px;background:#eee;margin:6px 0}
.note{font-size:10px;color:#666;line-height:1.5;font-style:italic}
.noai-note{font-size:10px;line-height:1.5;background:#FAECE7;color:#712B13;border-radius:5px;padding:5px 8px;margin-top:6px}
.graph-box{background:#f5f5f5;border-radius:8px;border:0.5px solid #ddd;padding:8px;min-height:200px}
.detail-box{margin-top:8px;background:#f5f5f5;border-radius:8px;border:0.5px solid #ddd;padding:10px 12px;display:none}
.detail-box.show{display:block}
.dp-title{font-size:12px;font-weight:500;color:#111;margin-bottom:3px}
.dp-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.dp-section-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:4px}
.prereq-item{display:flex;gap:6px;margin-bottom:5px;align-items:flex-start}
.prereq-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.prereq-text{font-size:11px;color:#111;line-height:1.45}
.prereq-risk{font-size:10px;color:#666;margin-top:1px}
.risk-tag{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:500;margin-right:3px}
.dep-list{display:flex;flex-direction:column;gap:4px;margin-top:5px}
.dep-item{display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:5px;background:#fff;border:0.5px solid #ddd;font-size:11px;cursor:pointer}
.dep-dir{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:500;white-space:nowrap}
.dep-same{background:#E6F1FB;color:#0C447C}
.dep-up{background:#EAF3DE;color:#27500A}
.dep-down{background:#EEEDFE;color:#3C3489}
.hint{font-size:10px;color:#aaa;margin-top:.6rem}
.td-biz{background:#FAEEDA;color:#633806;border:0.5px solid #FAC775}
.td-app{background:#EEEDFE;color:#3C3489;border:0.5px solid #AFA9EC}
.td-data{background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5}
.td-tech{background:#E6F1FB;color:#0C447C;border:0.5px solid #85B7EB}
.ln1{background:#EEEDFE;color:#3C3489}.ln2{background:#E1F5EE;color:#085041}.ln3{background:#FAEEDA;color:#633806}
.ln4{background:#E6F1FB;color:#0C447C}.ln5{background:#FAECE7;color:#712B13}.ln6{background:#FBEAF0;color:#72243E}
.ln7{background:#EAF3DE;color:#27500A}.ln8{background:#F1EFE8;color:#2C2C2A}
.graph-placeholder{display:flex;align-items:center;justify-content:center;min-height:180px;font-size:11px;color:#aaa;text-align:center;padding:1rem}
</style></head><body>
<p style="font-size:11px;color:#888;margin-bottom:1rem">AI Architecture Framework — TOGAF Layered v4 (archiviert)</p>

ntic"]}},data_vector:{layer:4,label:"Vektorembeddings",val:"Semantische Ähnlichkeitssuche",togaf:"data",adm:"C",noai:false,prereqs:[{text:"Embedding-Modell validiert",reason:"Generisch verliert Fachsemantik",risk:"med"},{text:"Chunking-Strategie validiert",reason:"Schlechtes Chunking degradiert Retrieval",risk:"high"},{text:"Vector Store skalierbar",reason:"Kritisch für RAG-Latenz",risk:"med"}],deps:{same:["data_unstructured","data_ontology"],up:["tech_genai","tech_agentic"],down:["fabric_fabric"]}},data_catalog:{layer:4,label:"Datenkatalog-Einbindung",val:"Auffindbarkeit, Lineage als AI-Kontext",togaf:"data",adm:"C",noai:false,prereqs:[{text:"Datenkatalog operativ",reason:"Ohne Katalog kein AI-Kontext",risk:"high"}],deps:{same:["data_vector"],up:["tech_ml","tech_genai","tech_agentic"],down:["fabric_catalog"]}},fabric_fabric:{layer:5,label:"Data Fabric",val:"Einheitlicher Zugang zu verteilten Daten",togaf:"tech",adm:"D",noai:true,prereqs:[{text:"Quellen inventarisiert",reason:"Fabric ohne Inventory = Teillösung",risk:"high"},{text:"Security-Architektur freigegeben",reason:"Traversiert Boundaries",risk:"high"},{text:"Plattform abgestimmt",reason:"Langfristige Entscheidung",risk:"med"}],deps:{same:["fabric_mesh","fabric_catalog","fabric_semantic"],up:["data_structured","data_vector"],down:["sec_rbac","sec_abac"]}},fabric_mesh:{layer:5,label:"Data Mesh",val:"Dezentrale Domänen-Ownership",togaf:"biz",adm:"B",noai:true,prereqs:[{text:"Domain Owner ernannt",reason:"Mesh ohne Ownership = Buzzword",risk:"high"},{text:"Self-Service bereitgestellt",reason:"Ohne Self-Service nur Overhead",risk:"high"},{text:"Standards definiert",reason:"Sonst neue Silos",risk:"med"}],deps:{same:["fabric_fabric","fabric_catalog"],up:["proc_process"],down:["sec_rbac"]}},fabric_catalog:{layer:5,label:"Datenkatalog",val:"Metadaten, Lineage, Klassifikation",togaf:"data",adm:"C",noai:false,prereqs:[{text:"Schema und Taxonomie definiert",reason:"Ohne Struktur = Chaos",risk:"high"},{text:"Crawler konf function filter(cat){activeFilter=cat;document.querySelectorAll('.pill').forEach(p=>{p.classList.toggle('active',p.getAttribute('onclick').includes("'"+cat+"'"))});document.getElementById('noai-banner').style.display=cat==='noai'?'block':'none';renderLayers()}
function toggleLayer(id){document.getElementById('lay_'+id).classList.toggle('open')}
function selectObj(oid){selectedObj=oid;document.querySelectorAll('.obj').forEach(el=>el.classList.remove('selected'));const el=document.getElementById('obj_'+oid);if(el){el.classList.add('selected')}renderGraph(oid);renderDetail(oid)}
function renderLayers(){const c=document.getElementById('layers-container');const isNoai=activeFilter==='noai';c.innerHTML=LAYERS.map(l=>{const show=catMatch[activeFilter](l);const hl=isNoai&&l.noai;const dom=TOGAF_DOMAIN[l.togaf];const objs=l.objects.map(oid=>{const o=OBJECTS[oid];if(!o)return'';const isNoaiObj=isNoai&&o.noai;return`<div id="obj_${oid}" class="obj${isNoaiObj?' noai-obj':''}${selectedObj===oid?' selected':''}" onclick="selectObj('${oid}')"><div class="obj-label">${o.label}</div><div class="obj-val">${o.val}</div></div>`}).join('');const noaiN=l.noaiNote&&isNoai?`<div class="noai-note">⚠ ${l.noaiNote}</div>`:'';return`<div id="lay_${l.id}" class="layer${show?'':' dim'}${hl?' noai-hl':''}"><div class="layer-head" onclick="toggleLayer('${l.id}')"><span class="lnum ${l.cls}">${l.num}</span><span class="ltitle">${l.title}</span><span class="togaf-domain ${dom.cls}">${dom.label}</span><span class="adm-badge">${ADM_LABELS[l.adm]||l.adm}</span><span class="chevron">▾</span></div><div class="layer-body"><div class="obj-grid">${objs}</div>${noaiN}${l.note?`<div class="divider"></div><p class="note">${l.note}</p>`:''}</div></div>`}).join('')}
function renderGraph(oid){const wrap=document.getElementById('graph-svg-wrap');if(!oid||!OBJECTS[oid]){wrap.innerHTML='<div class="graph-placeholder">Objekt links anklicken</div>';return}const o=OBJECTS[oid];const depIds=[...o.deps.same,...o.deps.up,...o.deps.down].filter(d=>OBJECTS[d]);const allIds=[oid,...depIds];const GW=600,NODE_W=110,NODE_H=36;const domColors={biz:{fill:'#FAEEDA',stroke:'#BA7517',text:'#633806'},app:{fill:'#EEEDFE',stroke:'#534AB7',text:'#3C3489'},data:{fill:'#E1F5EE',stroke:'#0F6E56',text:'#085041'},tech:{fill:'#E6F1FB',stroke:'#185FA5',text:'#0C447C'}};const edgeColors={same:'#888780',up:'#3B6D11',down:'#534AB7'};const byLayer={};allIds.forEach(id=>{const n=OBJECTS[id];if(!n)return;if(!byLayer[n.layer])byLayer[n.layer]=[];byLayer[n.layer].push(id)});const usedLayers=Object.keys(byLayer).map(Number).sort((a,b)=>a-b);const ROW_H=80;const totalH=usedLayers.length*ROW_H+60;const pos={};usedLayers.forEach((lnum,li)=>{const nodes=byLayer[lnum];const count=nodes.length;const margin=60;const avail=GW-2*margin;nodes.forEach((id,ni)=>{const x=count>1?margin+(avail/(count-1))*ni:GW/2;const y=40+li*ROW_H;pos[id]={x,y}})});const bandSvg=usedLayers.map((lnum,li)=>{const ly=LAYERS.find(l=>l.num===lnum);const y=40+li*ROW_H;return`<rect x="0" y="${y-18}" width="${GW}" height="${ROW_H}" fill="#f5f5f5" opacity=".4"/><text x="6" y="${y-4}" font-size="9" fill="#aaa" font-weight="500">L${lnum} ${ly?ly.title:''}</text>`}).join('');const edges=[...o.deps.same.filter(d=>OBJECTS[d]).map(d=>({a:oid,b:d,dir:'same'})),...o.deps.up.filter(d=>OBJECTS[d]).map(d=>({a:oid,b:d,dir:'up'})),...o.deps.down.filter(d=>OBJECTS[d]).map(d=>({a:oid,b:d,dir:'down'}))];const edgeSvg=edges.map(e=>{const a=pos[e.a],b=pos[e.b];if(!a||!b)return'';const col=edgeColors[e.dir];const dash=e.dir==='same'?'':'5 3';let d;if(e.dir==='same'){const mx=(a.x+b.x)/2;d=`M${a.x} ${a.y} C${mx} ${a.y} ${mx} ${b.y} ${b.x} ${b.y}`}else{const ay=e.dir==='up'?a.y-NODE_H/2:a.y+NODE_H/2;const by=e.dir==='up'?b.y+NODE_H/2:b.y-NODE_H/2;const my=(ay+by)/2;d=`M${a.x} ${ay} C${a.x} ${my} ${b.x} ${my} ${b.x} ${by}`}return`<path d="${d}" fill="none" stroke="${col}" stroke-width="1.3" stroke-dasharray="${dash}" marker-end="url(#ga)" opacity=".75"/>`}).join('');const nodeSvg=allIds.filter(id=>OBJECTS[id]).map(id=>{const n=OBJECTS[id];const p=pos[id];if(!p)return'';const dc=domColors[n.togaf]||domColors.biz;const isSel=id===oid;const sw=isSel?2:0.8;const lbl=n.label.length>14?n.label.slice(0,13)+'…':n.label;return`<g style="cursor:pointer" onclick="selectFromGraph('${id}')"><rect x="${(p.x-NODE_W/2).toFixed(1)}" y="${(p.y-NODE_H/2).toFixed(1)}" width="${NODE_W}" height="${NODE_H}" rx="7" fill="${dc.fill}" stroke="${dc.stroke}" stroke-width="${sw}"/><text x="${p.x.toFixed(1)}" y="${(p.y-4).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="${isSel?600:400}" fill="${dc.text}">${lbl}</text><text x="${p.x.toFixed(1)}" y="${(p.y+10).toFixed(1)}" text-anchor="middle" font-size="8" fill="${dc.text}" opacity=".7">${TOGAF_DOMAIN[n.togaf].label} · ${ADM_LABELS[n.adm]||n.adm}</text></g>`}).join('');const ly2=totalH+8;const legend=`<g><line x1="10" y1="${ly2+10}" x2="36" y2="${ly2+10}" stroke="${edgeColors.same}" stroke-width="1.2"/><text x="40" y="${ly2+14}" font-size="8" fill="#888">gleicher Layer</text><line x1="120" y1="${ly2+10}" x2="146" y2="${ly2+10}" stroke="${edgeColors.up}" stroke-width="1.2" stroke-dasharray="5 3"/><text x="150" y="${ly2+14}" font-size="8" fill="#888">übergeordnet</text><line x1="240" y1="${ly2+10}" x2="266" y2="${ly2+10}" stroke="${edgeColors.down}" stroke-width="1.2" stroke-dasharray="5 3"/><text x="270" y="${ly2+14}" font-size="8" fill="#888">untergeordnet</text></g>`;wrap.innerHTML=`<svg width="100%" viewBox="0 0 ${GW} ${totalH+30}" xmlns="http://www.w3.org/2000/svg"><defs><marker id="ga" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>${bandSvg}${edgeSvg}${nodeSvg}${legend}</svg>`}
function renderDetail(oid){const box=document.getElementById('detail-box');const o=OBJECTS[oid];if(!o){box.classList.remove('show');return}const dom=TOGAF_DOMAIN[o.togaf];const riskColor={high:'#D85A30',med:'#BA7517',low:'#3B6D11'};const riskLabel={high:'Risiko: hoch',med:'Risiko: mittel',low:'Risiko: niedrig'};const prereqsHtml=o.prereqs.map(p=>`<div class="prereq-item"><div class="prereq-dot" style="background:${riskColor[p.risk]}"></div><div><div class="prereq-text">${p.text}</div>${p.reason?`<div class="prereq-risk"><span class="risk-tag" style="background:${riskColor[p.risk]}22;color:${riskColor[p.risk]}">${riskLabel[p.risk]}</span>${p.reason}</div>`:''}</div></div>`).join('');const allDeps=[...o.deps.same.map(d=>({id:d,dir:'same'})),...o.deps.up.map(d=>({id:d,dir:'up'})),...o.deps.down.map(d=>({id:d,dir:'down'}))].filter(d=>OBJECTS[d.id]);const depsHtml=allDeps.map(d=>{const t=OBJECTS[d.id];const cls=d.dir==='same'?'dep-same':d.dir==='up'?'dep-up':'dep-down';const arrow=d.dir==='same'?'↔':d.dir==='up'?'↑':'↓';const domT=TOGAF_DOMAIN[t.togaf];return`<div class="dep-item" onclick="selectObj('${d.id}')"><span class="dep-dir ${cls}">${arrow}</span><span style="flex:1;font-size:11px">${t.label}</span><span class="togaf-domain ${domT.cls}" style="font-size:9px;padding:1px 5px">${domT.label}</span><span class="adm-badge">${ADM_LABELS[t.adm]||t.adm}</span></div>`}).join('');box.innerHTML=`<div class="dp-title">${o.label}</div><div class="dp-meta"><span class="togaf-domain ${dom.cls}">${dom.label} Architecture</span><span class="adm-badge">${ADM_LABELS[o.adm]||o.adm}</span>${o.noai?'<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:#FAECE7;color:#712B13;border:0.5px solid #F0997B">⚠ Deterministisch besser</span>':''}</div><div class="dp-section-label" style="margin-bottom:5px">Voraussetzungen</div>${prereqsHtml}${allDeps.length?`<div class="divider"></div><div class="dp-section-label" style="margin-bottom:5px">Abhängigkeiten</div><div class="dep-list">${depsHtml}</div>`:''}`; box.classList.add('show')}
function selectFromGraph(oid){selectedObj=oid;document.querySelectorAll('.obj').forEach(el=>el.classList.remove('selected'));const el=document.getElementById('obj_'+oid);if(el){el.classList.add('selected')}LAYERS.forEach(l=>{if(l.objects.includes(oid)){document.getElementById('lay_'+l.id).classList.add('open')}});renderGraph(oid);renderDetail(oid)}
window.selectFromGraph=selectFromGraph;
renderLayers();
</script>
</body></html>
