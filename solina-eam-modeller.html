<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solina EAM Modeller</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d45;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;

    --business: #f59e0b;
    --business-dim: rgba(245,158,11,0.12);
    --application: #22d3ee;
    --application-dim: rgba(34,211,238,0.12);
    --data: #a78bfa;
    --data-dim: rgba(167,139,250,0.12);
    --technology: #34d399;
    --technology-dim: rgba(52,211,153,0.12);
    --motivation: #f472b6;
    --motivation-dim: rgba(244,114,182,0.12);
    --strategy: #fb923c;
    --strategy-dim: rgba(251,146,60,0.12);

    --accent: #4f8ef7;
    --accent-glow: rgba(79,142,247,0.3);
    --arrow-cross: #f59e0b;
    --arrow-inner: #64748b;
    --selected: #4f8ef7;
    --selected-glow: rgba(79,142,247,0.25);

    --radius: 6px;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Header ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    display: flex; align-items: baseline; gap: 10px;
  }
  .logo-name {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid var(--accent);
    border-radius: 3px;
  }
  .header-right {
    display: flex; align-items: center; gap: 24px;
  }

  /* ─── Controls ───────────────────────────────────── */
  .controls {
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    padding: 12px 32px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .ctrl-group {
    display: flex; align-items: center; gap: 8px;
  }
  .ctrl-label {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }

  /* Toggle switch */
  .toggle-wrap { display: flex; align-items: center; gap: 8px; }
  .toggle {
    position: relative; width: 44px; height: 22px; cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 11px;
    transition: background .2s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: transform .2s, background .2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before {
    transform: translateX(22px);
    background: #fff;
  }
  .toggle-label { font-size: 11px; color: var(--text-dim); }

  /* Layer checkboxes */
  .layer-checks { display: flex; gap: 8px; flex-wrap: wrap; }
  .layer-check {
    display: flex; align-items: center; gap: 5px;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    transition: all .15s;
    user-select: none;
  }
  .layer-check:hover { border-color: var(--text-muted); }
  .layer-check.active { border-color: currentColor; background: rgba(255,255,255,0.04); }
  .layer-check-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .layer-check span { font-size: 10px; letter-spacing: .5px; }

  /* ─── Main canvas ────────────────────────────────── */
  .canvas-wrap {
    position: relative;
    padding: 24px 32px 40px;
    min-height: calc(100vh - 130px);
  }

  /* SVG arrow overlay */
  #arrow-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    overflow: visible;
  }

  /* ─── Layer row ──────────────────────────────────── */
  .layer-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 0;
    margin-bottom: 8px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: opacity .2s;
  }
  .layer-row.hidden { display: none; }

  .layer-label {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .layer-label::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .layer-label-name {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .layer-label-sub {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .layer-label-order {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 28px;
    font-family: var(--serif);
    font-weight: 700;
    opacity: 0.06;
    color: #fff;
    line-height: 1;
  }

  .layer-objects {
    padding: 10px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: flex-start;
    align-content: flex-start;
    position: relative;
    min-height: 52px;
  }

  /* ─── Object chip ────────────────────────────────── */
  .obj-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    transition: all .15s;
    position: relative;
    user-select: none;
    white-space: nowrap;
  }
  .obj-chip:hover { transform: translateY(-1px); }
  .obj-chip.selected {
    border-color: var(--selected) !important;
    box-shadow: 0 0 0 2px var(--selected-glow), 0 0 12px var(--accent-glow);
    z-index: 5;
  }
  .obj-chip.connected-same {
    border-color: var(--arrow-inner) !important;
    opacity: 1;
  }
  .obj-chip.connected-cross {
    border-color: var(--arrow-cross) !important;
    opacity: 1;
  }
  .obj-chip.dimmed { opacity: 0.2; }

  .chip-icon { font-size: 12px; line-height: 1; }

  /* Add button */
  .add-obj-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 9px;
    border-radius: 4px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    transition: all .15s;
  }
  .add-obj-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── Info panel ─────────────────────────────────── */
  .info-panel {
    position: fixed;
    right: 24px; bottom: 24px;
    width: 320px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: translateX(360px);
    transition: transform .3s cubic-bezier(0.16,1,0.3,1);
  }
  .info-panel.visible { transform: translateX(0); }
  .info-panel-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .info-section { margin-bottom: 12px; }
  .info-section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .info-conn-list { display: flex; flex-direction: column; gap: 4px; }
  .info-conn-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: var(--text-dim);
    padding: 3px 0;
  }
  .info-conn-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .close-panel {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    font-size: 16px; line-height: 1;
  }
  .close-panel:hover { color: var(--text); }

  /* ─── Edit modal ─────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 420px;
    max-width: 95vw;
  }
  .modal h3 {
    font-family: var(--serif);
    font-size: 18px;
    margin-bottom: 18px;
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .modal-field input, .modal-field select, .modal-field textarea {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
    border-color: var(--accent);
  }
  .modal-field select option { background: var(--surface2); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .btn {
    padding: 8px 18px;
    border-radius: var(--radius);
    border: none; cursor: pointer;
    font-family: var(--mono); font-size: 12px;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { filter: brightness(1.1); }

  /* ─── Legend ─────────────────────────────────────── */
  .legend {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    font-size: 10px; color: var(--text-muted);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-line {
    width: 22px; height: 2px;
    position: relative;
  }
  .legend-line.cross { background: var(--arrow-cross); }
  .legend-line.inner { background: var(--arrow-inner); }

  /* ─── Status bar ─────────────────────────────────── */
  .status-bar {
    padding: 8px 32px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 16px;
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 50;
    font-size: 10px; color: var(--text-muted);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--technology);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .canvas-wrap { padding-bottom: 80px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">Solina EAM Modeller</span>
    <span class="logo-tag">TOGAF v10</span>
  </div>
  <div class="header-right">
    <div class="legend">
      <span class="legend-item">
        <span class="legend-line cross"></span>
        <span>Layer-übergreifend</span>
      </span>
      <span class="legend-item">
        <span class="legend-line inner"></span>
        <span>Layer-intern</span>
      </span>
    </div>
  </div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Verbindungen</span>
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="toggle-cross" checked>
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">Layer-übergreifend</span>
    </div>
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="toggle-inner" checked>
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">Layer-intern</span>
    </div>
  </div>
  <div class="ctrl-group" style="margin-left:16px;">
    <span class="ctrl-label">Layer</span>
    <div class="layer-checks" id="layer-checks"></div>
  </div>
  <div class="ctrl-group" style="margin-left:auto;">
    <button class="btn btn-secondary" onclick="openAddObjectModal(null)" style="font-size:11px;">+ Objekt hinzufügen</button>
    <button class="btn btn-secondary" onclick="clearSelection()" style="font-size:11px;">Auswahl aufheben</button>
  </div>
</div>

<div class="canvas-wrap" id="canvas">
  <svg id="arrow-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow-cross" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
      </marker>
      <marker id="arrow-inner" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
      </marker>
      <marker id="arrow-cross-rev" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
        <path d="M8,0 L8,6 L0,3 z" fill="#f59e0b"/>
      </marker>
    </defs>
  </svg>
</div>

<div class="info-panel" id="info-panel">
  <button class="close-panel" onclick="clearSelection()">✕</button>
  <div class="info-panel-title" id="info-title">—</div>
  <div class="info-section">
    <div class="info-section-label">Layer</div>
    <div id="info-layer" style="font-size:12px;"></div>
  </div>
  <div class="info-section" id="info-cross-section">
    <div class="info-section-label">↕ Layer-übergreifende Verbindungen</div>
    <div class="info-conn-list" id="info-cross-list"></div>
  </div>
  <div class="info-section" id="info-inner-section">
    <div class="info-section-label">↔ Layer-interne Verbindungen</div>
    <div class="info-conn-list" id="info-inner-list"></div>
  </div>
  <div style="margin-top:14px; display:flex; gap:8px;">
    <button class="btn btn-secondary" style="font-size:10px;" onclick="editSelectedObject()">✏ Umbenennen</button>
    <button class="btn btn-danger" style="font-size:10px;" onclick="deleteSelectedObject()">✕ Löschen</button>
  </div>
</div>

<!-- Add/Edit Object Modal -->
<div class="modal-overlay" id="obj-modal">
  <div class="modal">
    <h3 id="modal-title">Objekt hinzufügen</h3>
    <div class="modal-field">
      <label>Name</label>
      <input type="text" id="modal-name" placeholder="Objektbezeichnung...">
    </div>
    <div class="modal-field">
      <label>Layer</label>
      <select id="modal-layer"></select>
    </div>
    <div class="modal-field">
      <label>Icon (Emoji)</label>
      <input type="text" id="modal-icon" placeholder="z.B. 📦" maxlength="2">
    </div>
    <div class="modal-field">
      <label>Beschreibung (optional)</label>
      <textarea id="modal-desc" rows="2" placeholder="Kurzbeschreibung..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveObject()">Speichern</button>
    </div>
  </div>
</div>

<div class="status-bar">
  <span class="status-dot"></span>
  <span id="status-text">Klicken Sie ein Objekt an, um Verbindungen anzuzeigen</span>
  <span style="margin-left:auto;">Solina EAM Modeller · TOGAF v10 ADM</span>
</div>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let selectedId = null;
let hiddenLayers = new Set();
let showCross = true;
let showInner = true;
let editingId = null;

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render() {
  const canvas = document.getElementById('canvas');
  // Clear all layer rows (keep SVG)
  canvas.querySelectorAll('.layer-row').forEach(el => el.remove());

  LAYERS.forEach(layer => {
    const layerObjs = objects.filter(o => o.layer === layer.id);
    const row = document.createElement('div');
    row.className = 'layer-row' + (hiddenLayers.has(layer.id) ? ' hidden' : '');
    row.dataset.layer = layer.id;
    row.id = 'layer-row-' + layer.id;

    // Label column
    const label = document.createElement('div');
    label.className = 'layer-label';
    label.style.background = layer.bg;
    label.innerHTML = `
      <span class="layer-label-order">${layer.order}</span>
      <div class="layer-label-name" style="color:${layer.color}">${layer.name}</div>
      <div class="layer-label-sub">${layer.sub}</div>
    `;
    label.style.setProperty('--layer-color', layer.color);
    label.querySelector('.layer-label-name').parentElement.style.borderLeft = `3px solid ${layer.color}`;
    label.style.borderLeft = `3px solid ${layer.color}`;

    // Objects column
    const objs = document.createElement('div');
    objs.className = 'layer-objects';
    objs.style.background = layer.bg;
    objs.id = 'layer-objects-' + layer.id;

    layerObjs.forEach(obj => {
      const chip = createChip(obj, layer);
      objs.appendChild(chip);
    });

    // Add button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-obj-btn';
    addBtn.innerHTML = '+ Objekt';
    addBtn.onclick = () => openAddObjectModal(layer.id);
    objs.appendChild(addBtn);

    row.appendChild(label);
    row.appendChild(objs);
    canvas.appendChild(row);
  });

  renderLayerChecks();
  if (selectedId) applySelection(selectedId);
}

function createChip(obj, layer) {
  const chip = document.createElement('div');
  chip.className = 'obj-chip';
  chip.id = 'chip-' + obj.id;
  chip.dataset.id = obj.id;
  chip.style.background = layer.bg;
  chip.style.color = layer.color;
  chip.style.borderColor = layer.color + '44';
  chip.innerHTML = `<span class="chip-icon">${obj.icon || '●'}</span><span>${obj.name}</span>`;
  chip.title = obj.desc || obj.name;
  chip.onclick = () => selectObject(obj.id);
  return chip;
}

function renderLayerChecks() {
  const cont = document.getElementById('layer-checks');
  cont.innerHTML = '';
  LAYERS.forEach(layer => {
    const el = document.createElement('div');
    el.className = 'layer-check' + (hiddenLayers.has(layer.id) ? '' : ' active');
    el.style.color = layer.color;
    el.innerHTML = `<span class="layer-check-dot" style="background:${layer.color}"></span><span>${layer.name}</span>`;
    el.onclick = () => {
      if (hiddenLayers.has(layer.id)) hiddenLayers.delete(layer.id);
      else hiddenLayers.add(layer.id);
      render();
      drawArrows();
    };
    cont.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════
// SELECTION & ARROWS
// ═══════════════════════════════════════════════════
function selectObject(id) {
  selectedId = id;
  applySelection(id);
  updateInfoPanel(id);
  drawArrows();
}

function applySelection(id) {
  // Reset all chips
  document.querySelectorAll('.obj-chip').forEach(c => {
    c.classList.remove('selected', 'connected-cross', 'connected-same', 'dimmed');
  });

  const chip = document.getElementById('chip-' + id);
  if (!chip) return;
  chip.classList.add('selected');

  // Find connections
  const connectedCross = new Set();
  const connectedInner = new Set();

  if (showCross) {
    crossConnections.forEach(([from, to]) => {
      if (from === id) connectedCross.add(to);
      if (to === id) connectedCross.add(from);
    });
  }
  if (showInner) {
    innerConnections.forEach(([from, to]) => {
      if (from === id) connectedInner.add(to);
      if (to === id) connectedInner.add(from);
    });
  }

  const allConnected = new Set([...connectedCross, ...connectedInner]);

  document.querySelectorAll('.obj-chip').forEach(c => {
    const cid = c.dataset.id;
    if (cid === id) return;
    if (connectedCross.has(cid)) {
      c.classList.add('connected-cross');
    } else if (connectedInner.has(cid)) {
      c.classList.add('connected-same');
    } else {
      c.classList.add('dimmed');
    }
  });

  document.getElementById('status-text').textContent =
    `Objekt "${objects.find(o=>o.id===id)?.name}" — ${connectedCross.size} layer-übergreifend, ${connectedInner.size} layer-intern`;
}

function clearSelection() {
  selectedId = null;
  document.querySelectorAll('.obj-chip').forEach(c => {
    c.classList.remove('selected', 'connected-cross', 'connected-same', 'dimmed');
  });
  clearArrows();
  document.getElementById('info-panel').classList.remove('visible');
  document.getElementById('status-text').textContent = 'Klicken Sie ein Objekt an, um Verbindungen anzuzeigen';
}

function drawArrows() {
  clearArrows();
  if (!selectedId) return;
  const id = selectedId;
  const svg = document.getElementById('arrow-svg');
  const canvasRect = document.getElementById('canvas').getBoundingClientRect();
  const scrollY = document.getElementById('canvas').closest('.canvas-wrap')?.scrollTop || window.scrollY;

  function getChipCenter(chipId) {
    const el = document.getElementById('chip-' + chipId);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
      x: r.left - canvasRect.left + r.width / 2,
      y: r.top - canvasRect.top + r.height / 2 + (window.scrollY - 0)
    };
  }

  function drawLine(fromId, toId, isCross) {
    if (!showCross && isCross) return;
    if (!showInner && !isCross) return;
    const from = getChipCenter(fromId);
    const to = getChipCenter(toId);
    if (!from || !to) return;

    const color = isCross ? '#f59e0b' : '#64748b';
    const markerId = isCross ? 'arrow-cross' : 'arrow-inner';

    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const cx1 = from.x + dx * 0.2;
    const cy1 = from.y + dy * 0.5;
    const cx2 = to.x - dx * 0.2;
    const cy2 = from.y + dy * 0.5;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${from.x} ${from.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${to.x} ${to.y}`);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', isCross ? '2' : '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('marker-end', `url(#${markerId})`);
    path.setAttribute('stroke-dasharray', isCross ? '0' : '4 3');
    path.setAttribute('opacity', isCross ? '0.85' : '0.7');
    svg.appendChild(path);
  }

  crossConnections.forEach(([from, to]) => {
    if (from === id || to === id) drawLine(from, to, true);
  });
  innerConnections.forEach(([from, to]) => {
    if (from === id || to === id) drawLine(from, to, false);
  });
}

function clearArrows() {
  const svg = document.getElementById('arrow-svg');
  svg.querySelectorAll('path').forEach(p => p.remove());
}

// ═══════════════════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════════════════
function updateInfoPanel(id) {
  const obj = objects.find(o => o.id === id);
  if (!obj) return;
  const layer = LAYERS.find(l => l.id === obj.layer);

  document.getElementById('info-title').textContent = (obj.icon || '') + ' ' + obj.name;
  document.getElementById('info-layer').innerHTML =
    `<span style="color:${layer.color}">${layer.name}</span> — ${layer.sub}`;

  // Cross connections
  const crossList = document.getElementById('info-cross-list');
  crossList.innerHTML = '';
  crossConnections.forEach(([from, to, label]) => {
    if (from === id || to === id) {
      const otherId = from === id ? to : from;
      const other = objects.find(o => o.id === otherId);
      const otherLayer = other ? LAYERS.find(l => l.id === other.layer) : null;
      if (!other || !otherLayer) return;
      const dir = from === id ? '→' : '←';
      const item = document.createElement('div');
      item.className = 'info-conn-item';
      item.innerHTML = `
        <span class="info-conn-dot" style="background:${otherLayer.color}"></span>
        <span style="color:#94a3b8">${dir}</span>
        <span style="color:${otherLayer.color}">${other.name}</span>
        <span style="color:#475569;font-size:10px">(${label})</span>
      `;
      crossList.appendChild(item);
    }
  });
  if (!crossList.children.length) crossList.innerHTML = '<span style="color:#475569;font-size:11px">Keine Verbindungen</span>';

  // Inner connections
  const innerList = document.getElementById('info-inner-list');
  innerList.innerHTML = '';
  innerConnections.forEach(([from, to, label]) => {
    if (from === id || to === id) {
      const otherId = from === id ? to : from;
      const other = objects.find(o => o.id === otherId);
      if (!other) return;
      const dir = from === id ? '→' : '←';
      const item = document.createElement('div');
      item.className = 'info-conn-item';
      item.innerHTML = `
        <span class="info-conn-dot" style="background:#64748b"></span>
        <span style="color:#94a3b8">${dir}</span>
        <span>${other.name}</span>
        <span style="color:#475569;font-size:10px">(${label})</span>
      `;
      innerList.appendChild(item);
    }
  });
  if (!innerList.children.length) innerList.innerHTML = '<span style="color:#475569;font-size:11px">Keine Verbindungen</span>';

  document.getElementById('info-panel').classList.add('visible');
}

// ═══════════════════════════════════════════════════
// MODAL: ADD / EDIT OBJECT
// ═══════════════════════════════════════════════════
function openAddObjectModal(layerId) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Objekt hinzufügen';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-icon').value = '';
  document.getElementById('modal-desc').value = '';
  populateLayerSelect(layerId);
  document.getElementById('obj-modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
}

function editSelectedObject() {
  if (!selectedId) return;
  const obj = objects.find(o => o.id === selectedId);
  if (!obj) return;
  editingId = selectedId;
  document.getElementById('modal-title').textContent = 'Objekt bearbeiten';
  document.getElementById('modal-name').value = obj.name;
  document.getElementById('modal-icon').value = obj.icon || '';
  document.getElementById('modal-desc').value = obj.desc || '';
  populateLayerSelect(obj.layer);
  document.getElementById('obj-modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
}

function populateLayerSelect(selectedLayerId) {
  const sel = document.getElementById('modal-layer');
  sel.innerHTML = '';
  LAYERS.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l.id;
    opt.textContent = l.name;
    if (l.id === selectedLayerId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function closeModal() {
  document.getElementById('obj-modal').classList.remove('open');
  editingId = null;
}

function saveObject() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { document.getElementById('modal-name').focus(); return; }
  const layerId = document.getElementById('modal-layer').value;
  const icon = document.getElementById('modal-icon').value.trim() || '●';
  const desc = document.getElementById('modal-desc').value.trim();

  if (editingId) {
    const obj = objects.find(o => o.id === editingId);
    if (obj) { obj.name = name; obj.layer = layerId; obj.icon = icon; obj.desc = desc; }
  } else {
    const newId = 'custom_' + Date.now();
    objects.push({ id: newId, layer: layerId, name, icon, desc });
  }
  closeModal();
  render();
  if (selectedId) { drawArrows(); }
}

function deleteSelectedObject() {
  if (!selectedId) return;
  if (!confirm('Objekt wirklich löschen?')) return;
  objects = objects.filter(o => o.id !== selectedId);
  crossConnections = crossConnections.filter(([f, t]) => f !== selectedId && t !== selectedId);
  innerConnections = innerConnections.filter(([f, t]) => f !== selectedId && t !== selectedId);
  clearSelection();
  render();
}

// ═══════════════════════════════════════════════════
// TOGGLES
// ═══════════════════════════════════════════════════
document.getElementById('toggle-cross').addEventListener('change', e => {
  showCross = e.target.checked;
  if (selectedId) { applySelection(selectedId); drawArrows(); }
});
document.getElementById('toggle-inner').addEventListener('change', e => {
  showInner = e.target.checked;
  if (selectedId) { applySelection(selectedId); drawArrows(); }
});

// Redraw arrows on scroll/resize
window.addEventListener('scroll', () => { if (selectedId) drawArrows(); });
window.addEventListener('resize', () => { if (selectedId) drawArrows(); });

// Close modal on overlay click
document.getElementById('obj-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('obj-modal')) closeModal();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { clearSelection(); closeModal(); }
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
render();
