# Sovaia Architecture-Modeler — Docker-Compose für lokale Demo + Dev.
#
# Usage:
#   docker compose up --build          # erstmaliger Start (baut Images)
#   docker compose up -d               # detached (im Hintergrund)
#   docker compose logs -f backend     # Logs vom Backend
#   docker compose restart backend     # Backend neu (kein Rebuild nötig dank Volume-Mount)
#   docker compose down                # alles stoppen
#
# URLs nach Start:
#   http://<host>:5173/                → Frontend (Stakeholder-Navigator + Architect-Canvas)
#   http://<host>:8003/v1/health       → Backend-API direkt
#
# Voraussetzung: sovaia-contracts liegt als Geschwister-Repo (~/sovaia-contracts).
# Override per .env-Datei: EAM_CONTRACTS_PATH=/abs/path/zu/sovaia-contracts
#
# LLM-Modus: per Default `stub` (siehe ADR-082 §"Classic-Reference-Modell").
# Echter DGX-Call wenn DGX wieder erreichbar:
#   .env:  EAM_LLM_MODE=dgx  DGX_LLM_URL=http://...  DGX_MODEL=...

services:

  bridge:
    build:
      context: ./eam-llm-bridge
    container_name: eam-modeler-bridge
    environment:
      EAM_LLM_MODE: ${EAM_LLM_MODE:-stub}
      DGX_LLM_URL: ${DGX_LLM_URL:-}
      DGX_MODEL: ${DGX_MODEL:-default}
      DGX_API_KEY: ${DGX_API_KEY:-}
      DGX_TIMEOUT_SECONDS: ${DGX_TIMEOUT_SECONDS:-150}
    volumes:
      - ./eam-llm-bridge/app:/app/app           # Hot-Reload Code-Mount
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:8001/v1/health\", timeout=2).raise_for_status()'"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: eam-modeler-backend
    ports:
      - "8003:8000"
    environment:
      EAM_ENV: docker
      EAM_REFERENCE_REPO_PATH: /etc/sovaia-reference
      EAM_LLM_BRIDGE_URL: http://bridge:8001
      EAM_LLM_BRIDGE_TIMEOUT: ${EAM_LLM_BRIDGE_TIMEOUT:-180}
      EAM_OVERLAY_DIR: /data/overlays
      EAM_TENANT_DEFAULT: ${EAM_TENANT_DEFAULT:-sovaia-internal}
    volumes:
      - ${EAM_CONTRACTS_PATH:-../sovaia-contracts}/registry/architecture-modeler:/etc/sovaia-reference:ro
      - ./overlays:/data/overlays               # Tenant-Edits persistent
      - ./backend/app:/app/app                  # Hot-Reload Code-Mount
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      bridge:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:8000/v1/health\", timeout=2).raise_for_status()'"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: eam-modeler-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started

# Netzwerk:
# Default-Netz, alle drei Services können sich per Service-Name erreichen
# (backend → bridge → backend). Nur Frontend (5173) und Backend (8003)
# sind nach außen exponiert.
